<header class="navbar" [class.collapsed]="navCollapsed">
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/about" routerLinkActive="active">About Me</a>
    <a routerLink="/projects" routerLinkActive="active">Projects</a>
  </nav>

  <button class="collapse-btn" (click)="navCollapsed = !navCollapsed; settingsOpen = false" [title]="navCollapsed ? 'Expand navbar' : 'Collapse navbar'">
    <span class="collapse-chevron" [class.flipped]="navCollapsed">&#8963;</span>
  </button>

  <button class="settings-btn" (click)="settingsOpen = !settingsOpen">Settings</button>

  @if (settingsOpen) {
    <div class="settings-card">
      <h2>Website Settings</h2>

      <div class="setting-row">
        <label>Background Color</label>
        <div class="wheel-wrapper">
          <input
            type="color"
            [value]="theme.backgroundColor()"
            (input)="theme.backgroundColor.set($any($event.target).value)"
          />
        </div>
      </div>

      <div class="setting-row">
        <label>Text Color</label>
        <div class="wheel-wrapper">
          <input
            type="color"
            [value]="theme.textColor()"
            (input)="theme.textColor.set($any($event.target).value)"
          />
        </div>
      </div>

      <button class="default-btn" (click)="theme.reset()">Default</button>
    </div>
  }
</header>

<div class="expand-tab" [class.visible]="navCollapsed" (click)="navCollapsed = false">
  <span>&#8964;</span>
</div>

<main [style.background-color]="theme.backgroundColor()" [style.color]="theme.textColor()">
  <router-outlet />
</main>
