<header class="navbar" [class.collapsed]="navCollapsed" [style.font-family]="theme.applyFontToHeader() ? theme.fontFamily() : null" [style.--header-text-color]="theme.applyTextColorToHeader() ? theme.textColor() : null">
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/about" routerLinkActive="active">About Me</a>
    <a routerLink="/projects" routerLinkActive="active">Projects</a>
    <a routerLink="/resume" routerLinkActive="active">Resume</a>
    <a routerLink="/feedback" routerLinkActive="active">Feedback</a>
  </nav>

  <button class="collapse-btn" (click)="navCollapsed = !navCollapsed; settingsOpen = false" [title]="navCollapsed ? 'Expand navbar' : 'Collapse navbar'">
    <span class="collapse-chevron" [class.flipped]="navCollapsed">&#8963;</span>
  </button>

  <button class="settings-btn" (click)="settingsOpen = !settingsOpen">Settings</button>

  @if (settingsOpen) {
    <div class="settings-card">
      <h2>Website Settings</h2>

      <div class="setting-row">
        <label>Background Color</label>
        <div class="wheel-wrapper">
          <input
            type="color"
            [value]="theme.backgroundColor()"
            (input)="theme.backgroundColor.set($any($event.target).value)"
          />
        </div>
      </div>

      <div class="setting-row">
        <label>Text Color</label>
        <div class="wheel-wrapper">
          <input
            type="color"
            [value]="theme.textColor()"
            (input)="theme.textColor.set($any($event.target).value)"
          />
        </div>
      </div>

      <div class="setting-row sub-row">
        <label>Apply color to all text</label>
        <label class="toggle">
          <input
            type="checkbox"
            [checked]="theme.applyTextColorToHeader()"
            (change)="theme.applyTextColorToHeader.set($any($event.target).checked)"
          />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <div class="setting-row">
        <label>Font</label>
        <select
          class="font-select"
          [value]="theme.fontFamily()"
          (change)="theme.fontFamily.set($any($event.target).value)"
          [style.font-family]="theme.fontFamily().includes('Wingdings') && theme.applyFontToHeader() ? theme.fontFamily() : null"
        >
          @for (opt of theme.fontOptions; track opt.value) {
            <option [value]="opt.value" [style.font-family]="theme.fontFamily().includes('Wingdings') && theme.applyFontToHeader() ? theme.fontFamily() : opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>

      <div class="setting-row sub-row">
        <label>Apply font to all text</label>
        <label class="toggle">
          <input
            type="checkbox"
            [checked]="theme.applyFontToHeader()"
            (change)="theme.applyFontToHeader.set($any($event.target).checked)"
          />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>

      <button class="default-btn" (click)="theme.reset()">Default</button>
    </div>
  }
</header>

<div class="expand-tab" [class.visible]="navCollapsed" (click)="navCollapsed = false">
  <span>&#8964;</span>
</div>

<main [style.background-color]="theme.backgroundColor()" [style.color]="theme.textColor()" [style.font-family]="theme.fontFamily()">
  <router-outlet />
</main>
