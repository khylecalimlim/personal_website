<!-- TODO: replace href="#" on each project card with the real GitHub repo URL once created -->
<div class="page">
  <h1>Projects</h1>
  <p class="subtitle">Things I've been building and exploring.</p>
  <p class="drag-hint">Drag to reorder</p>

  <div class="projects-grid" cdkDropList (cdkDropListDropped)="drop($event)">
    @for (project of projects; track project.title) {
      <div class="project-card" cdkDrag>
        <div class="drag-handle" cdkDragHandle aria-label="Drag to reorder">
          <span class="handle-icon" aria-hidden="true">⠿</span>
        </div>

        <div class="card-body">
          <div class="card-header">
            <a [href]="project.href" class="project-title" target="_blank" rel="noopener">
              {{ project.title }}
              <span class="link-icon" aria-hidden="true">↗</span>
            </a>
            <div class="header-right">
              @if (project.playHref) {
                <a [href]="project.playHref" class="play-link" target="_blank" rel="noopener">Play</a>
              }
              <span class="status" [class]="project.status">{{ project.statusLabel }}</span>
            </div>
          </div>
          <p class="description">{{ project.description }}</p>
          <div class="tags">
            @for (tag of project.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>
        </div>

        <div *cdkDragPlaceholder class="drag-placeholder"></div>
      </div>
    }
  </div>
</div>
