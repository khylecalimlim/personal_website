<div class="page">
  <h1>Dashboard</h1>
  <p class="subtitle">Personal links and progress tracking.</p>

  @for (section of sections; track section.title) {
    <section class="dashboard-section">
      <h2>{{ section.title }}</h2>
      <ul class="link-list">
        @for (link of section.links; track link.href) {
          <li
            class="link-card"
            [class.pop]="link.popping"
            (click)="pop(link)"
            (animationend)="link.popping = false"
          >
            <a [href]="link.href" class="link-text" target="_blank" rel="noopener">
              {{ link.label }}
              <span class="link-icon">↗</span>
            </a>
          </li>
        }
      </ul>
    </section>
  }
</div>
